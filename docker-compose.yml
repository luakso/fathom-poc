name: fathom-poc

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20

  init-db:
    build:
      context: .
      target: init-db
    environment:
      DB_URL: ${DB_URL}
    volumes:
      - ./database/migrations:/migrations:ro
      - ./database/views:/views:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  base-collector:
    build:
      context: .
      target: runtime
      args:
        BINARY: base-collector
    image: fathom-base-collector:dev
    restart: "no"  # on-demand: docker compose run --rm base-collector backfill --from-block X --to-block Y
    environment:
      APP_ENV: local
      DATABASE__URL: ${DB_URL}
      BASE__HYPERSYNC_URL: ${BASE_HYPERSYNC_URL:-https://base.hypersync.xyz}
      BASE__HYPERSYNC_BEARER_TOKEN: ${BASE_HYPERSYNC_BEARER_TOKEN:-}
    depends_on:
      init-db:
        condition: service_completed_successfully

  publisher:
    build:
      context: .
      target: runtime
      args:
        BINARY: publisher
    image: fathom-publisher:dev
    restart: "no"
    environment:
      APP_ENV: local
      DATABASE__URL: ${DB_URL}
    depends_on:
      init-db:
        condition: service_completed_successfully
    profiles: ["manual"]

volumes:
  postgres-data:
