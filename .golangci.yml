version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck  # in v2, staticcheck includes the former gosimple (S* checks) and stylecheck (ST*)
    - ineffassign
    - unused
    - gosec
    - revive
    - gocritic
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes:
        - G104  # duplicated by errcheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lukostrobl/fathom
