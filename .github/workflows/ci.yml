name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: golangci-lint
        run: go tool golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fathom
          POSTGRES_PASSWORD: fathom
          POSTGRES_DB: fathom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fathom"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DB_URL_HOST: postgres://fathom:fathom@localhost:5432/fathom?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Apply migrations
        run: go tool goose -dir database/migrations postgres "$DB_URL_HOST" up
      - name: Test
        run: go test -race ./...

  vuln:
    name: Vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: go tool govulncheck ./...

  build-binaries:
    name: Docker build (${{ matrix.binary }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        binary: [base-collector, publisher]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build \
            --build-arg BINARY=${{ matrix.binary }} \
            --target runtime \
            -t fathom-${{ matrix.binary }}:ci \
            .

  build-init-db:
    name: Docker build (init-db)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build \
            --target init-db \
            -t fathom-init-db:ci \
            .

  web:
    name: Web (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Anatomy - install
        working-directory: web/anatomy
        run: bun install --frozen-lockfile
      - name: Anatomy - build
        working-directory: web/anatomy
        run: bun run build
      - name: Anatomy - test
        working-directory: web/anatomy
        run: bun run test
      - name: Sonar dashboard - install
        working-directory: web/sonar/tests
        run: bun install --frozen-lockfile
      - name: Sonar dashboard - test
        working-directory: web/sonar/tests
        run: bun run test

  release:
    name: Push image (${{ matrix.image }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, vuln, build-binaries, build-init-db, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: base-collector, target: runtime, binary: base-collector }
          - { image: publisher, target: runtime, binary: publisher }
          - { image: init-db, target: init-db, binary: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: |
            BINARY=${{ matrix.binary }}
          push: true
          tags: |
            ghcr.io/luakso/fathom-${{ matrix.image }}:latest
            ghcr.io/luakso/fathom-${{ matrix.image }}:${{ github.sha }}
